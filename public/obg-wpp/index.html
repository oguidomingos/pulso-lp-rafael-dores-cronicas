<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obrigado | Dr. Rafael Rocha</title>
    <meta
      name="description"
      content="Obrigado pelo contato. Você será redirecionado para o WhatsApp do Dr. Rafael Rocha."
    />
    <script>
      (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
      new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
      j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
      'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
      })(window,document,'script','dataLayer','GTM-PJFG9D49');
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --dark: #0f1e28;
        --card: #0f3340;
        --section: #2b373f;
        --accent: #5bb4d0;
        --text: #ffffff;
        --muted: #b1bcc5;
        --green: #16a34a;
        --green-hover: #15803d;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background:
          linear-gradient(to right, rgba(15, 30, 40, 0.96) 0%, rgba(15, 30, 40, 0.92) 40%, rgba(15, 51, 64, 0.88) 100%),
          url("../img/hero-medical-texture.jpg") center/cover no-repeat;
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .shell {
        width: 100%;
        max-width: 720px;
      }

      .brand {
        display: flex;
        justify-content: center;
        margin-bottom: 24px;
      }

      .brand img {
        width: min(100%, 420px);
        height: auto;
      }

      .card {
        background: rgba(15, 51, 64, 0.84);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 28px;
        padding: 36px 32px;
        text-align: center;
        box-shadow: 0 32px 64px rgba(2, 18, 27, 0.28);
        backdrop-filter: blur(12px);
      }

      .eyebrow {
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.16em;
        font-size: 0.82rem;
        font-weight: 700;
        margin: 0 0 16px;
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(2rem, 4vw, 3.25rem);
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.65;
      }

      .status {
        margin: 28px auto 26px;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 12px 18px;
        border-radius: 999px;
        background: rgba(91, 180, 208, 0.12);
        border: 1px solid rgba(91, 180, 208, 0.22);
        color: var(--accent);
        font-weight: 600;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 0 6px rgba(91, 180, 208, 0.15);
        animation: pulse 1.4s ease-in-out infinite;
      }

      .cta {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 30px;
        min-height: 56px;
        width: min(100%, 360px);
        padding: 14px 24px;
        border-radius: 14px;
        background: var(--green);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        transition: background-color 0.2s ease, transform 0.2s ease;
      }

      .cta:hover {
        background: var(--green-hover);
        transform: translateY(-1px);
      }

      .hint {
        margin-top: 18px;
        font-size: 0.92rem;
        color: #94a3b8;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.18); opacity: 0.82; }
      }

      @media (max-width: 640px) {
        .card {
          padding: 28px 20px;
          border-radius: 22px;
        }

        p {
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-PJFG9D49"
        height="0"
        width="0"
        style="display:none;visibility:hidden"
      ></iframe>
    </noscript>

    <main class="shell">
      <div class="brand">
        <img src="../img/navbar-logo.png" alt="Dr. Rafael Rocha" />
      </div>

      <section class="card">
        <p class="eyebrow">Obrigado pelo contato</p>
        <h1>Você será redirecionado para o WhatsApp</h1>
        <p id="thanks-copy">
          Recebemos seus dados. Em instantes você seguirá para o atendimento no WhatsApp para continuar o agendamento.
        </p>

        <div class="status">
          <span class="status-dot"></span>
          Redirecionando automaticamente...
        </div>

        <a id="direct-whatsapp" class="cta" href="#" rel="noopener noreferrer">
          Ir direto para o WhatsApp
        </a>

        <p class="hint">Se o redirecionamento não acontecer, use o botão acima.</p>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const name = params.get("name") || "";
      const phone = params.get("phone") || "";
      const source = params.get("source") || "hero_form";
      const pageUrl = params.get("page_url") || window.location.href;
      const utmSource = params.get("utm_source") || "";
      const utmMedium = params.get("utm_medium") || "";
      const utmCampaign = params.get("utm_campaign") || "";
      const leadWebhookUrl = "https://script.google.com/macros/s/AKfycbzuObLS5FTU7Dh6oErgM8SMMpEJnA0FRk00bW-s4OK4rSVkzfUPEpiuVjfLGjnxVQhc/exec";
      const whatsappNumber = "5561999190221";
      const message = "Olá! Gostaria de agendar uma consulta com o Dr. Rafael Rocha.";
      const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
      const button = document.getElementById("direct-whatsapp");
      button.href = whatsappUrl;

      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({
        event: "lead_thank_you_view",
        lead_name: name,
        lead_phone: phone,
        lead_source: source,
        page_location: pageUrl,
      });

      const leadUrl = new URL(leadWebhookUrl);
      leadUrl.searchParams.set("created_at", new Date().toISOString());
      leadUrl.searchParams.set("name", name);
      leadUrl.searchParams.set("phone", phone);
      leadUrl.searchParams.set("source", source);
      leadUrl.searchParams.set("page_url", pageUrl);
      leadUrl.searchParams.set("utm_source", utmSource);
      leadUrl.searchParams.set("utm_medium", utmMedium);
      leadUrl.searchParams.set("utm_campaign", utmCampaign);
      leadUrl.searchParams.set("notes", "captured_via_thank_you_page");

      let redirected = false;

      function redirectToWhatsApp() {
        if (redirected) return;
        redirected = true;
        window.location.replace(whatsappUrl);
      }

      const fallbackTimer = setTimeout(redirectToWhatsApp, 3500);

      fetch(leadUrl.toString(), {
        method: "GET",
        mode: "no-cors",
        cache: "no-store",
      })
        .catch(() => {})
        .finally(() => {
          clearTimeout(fallbackTimer);
          setTimeout(redirectToWhatsApp, 300);
        });
    </script>
  </body>
</html>
